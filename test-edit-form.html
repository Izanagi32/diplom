<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест форми редагування</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/css/admin-enhanced.css" />
  <style>
    body {
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    .test-buttons {
      margin-bottom: 20px;
    }
    .test-buttons button {
      margin-right: 10px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .test-buttons button:hover {
      background: #0056b3;
    }
    .console-output {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      padding: 15px;
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Тест форми редагування заявок</h1>
  
  <div class="test-buttons">
    <button onclick="testEditForm()">Тест форми редагування</button>
    <button onclick="testEditFormADR()">Тест форми з ADR</button>
    <button onclick="testFormElements()">Перевірити елементи форми</button>
    <button onclick="testAPI()">Тест API</button>
    <button onclick="testStatusUpdate()">Тест оновлення статусу</button>
    <button onclick="clearConsole()">Очистити консоль</button>
  </div>
  
  <div id="consoleOutput" class="console-output">
    Консоль буде відображена тут...
  </div>

  <!-- Modal Placeholder -->
  <div class="modal-overlay" id="modalOverlay">
    <!-- Modals will be created dynamically -->
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="./src/js/config.js"></script>
  <script src="./src/js/admin-enhanced.js"></script>
  
  <script>
    // Override console.log to display in page
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    const consoleOutput = document.getElementById('consoleOutput');
    
    function addToConsole(message, type = 'log') {
      const timestamp = new Date().toLocaleTimeString();
      const prefix = type === 'error' ? '❌' : type === 'warn' ? '⚠️' : 'ℹ️';
      consoleOutput.textContent += `[${timestamp}] ${prefix} ${message}\n`;
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      addToConsole(args.join(' '), 'log');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      addToConsole(args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalWarn.apply(console, args);
      addToConsole(args.join(' '), 'warn');
    };
    
    function clearConsole() {
      consoleOutput.textContent = 'Консоль очищена...\n';
    }
    
    // Initialize admin panel
    let adminPanel;
    
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Ініціалізація тестової сторінки...');
      
      // Create mock data for testing
      const mockData = [
        {
          id: 1,
          pickupLocation: 'Київ',
          deliveryLocation: 'Варшава',
          pickupDate: '2024-01-15',
          cargoType: 'Електроніка',
          length: 1.2,
          width: 0.8,
          height: 0.6,
          weight: 150,
          quantity: 5,
          adr: false, // ✅ Виправлено: використовуємо 'adr' замість 'isAdr'
          adrClass: null,
          contactName: 'Іван Петренко',
          phone: '+380671234567',
          email: 'ivan@example.com',
          status: 'pending',
          priority: 'medium',
          assignedTo: null,
          comment: 'Тестова заявка',
          createdAt: '2024-01-10T10:00:00Z',
          updatedAt: null
        },
        {
          id: 2,
          pickupLocation: 'Львів',
          deliveryLocation: 'Берлін',
          pickupDate: '2024-01-20',
          cargoType: 'Фармацевтика',
          length: 0.5,
          width: 0.3,
          height: 0.2,
          weight: 25,
          quantity: 10,
          adr: true, // ✅ Тест з ADR вантажем
          adrClass: 'Клас 6.1',
          contactName: 'Марія Коваленко',
          phone: '+380501234567',
          email: 'maria@example.com',
          status: 'approved',
          priority: 'high',
          assignedTo: 'Олександр',
          comment: 'Термінова доставка ADR вантажу',
          createdAt: '2024-01-12T14:30:00Z',
          updatedAt: '2024-01-12T15:00:00Z'
        }
      ];
      
      try {
        adminPanel = new EnhancedAdminPanel();
        adminPanel.currentData = mockData;
        adminPanel.filteredData = mockData;
        console.log('✅ Адміністративна панель ініціалізована');
        console.log('Доступні методи тестування: testEditForm(), testFormElements(), testAPI()');
      } catch (error) {
        console.error('❌ Помилка ініціалізації:', error);
      }
    });
    
    function testEditForm() {
      if (!adminPanel) {
        console.error('Адміністративна панель не ініціалізована');
        return;
      }
      
      console.log('🧪 Запуск тесту форми редагування...');
      adminPanel.testEditForm(1);
      
      // Test form elements after a delay
      setTimeout(() => {
        testFormElements();
      }, 500);
    }
    
    function testEditFormADR() {
      if (!adminPanel) {
        console.error('Адміністративна панель не ініціалізована');
        return;
      }
      
      console.log('🧪 Запуск тесту форми редагування з ADR...');
      adminPanel.testEditForm(2); // Тестуємо з ADR заявкою
      
      setTimeout(() => {
        console.log('🧪 Перевіряємо ADR функціональність...');
        const adrCheckbox = document.getElementById('editIsAdr');
        const adrClassGroup = document.getElementById('adrClassGroup');
        const adrClassSelect = document.getElementById('editAdrClass');
        
        console.log('ADR checkbox:', adrCheckbox ? '✅ Found' : '❌ Missing');
        console.log('ADR checkbox checked:', adrCheckbox?.checked);
        console.log('ADR class group:', adrClassGroup ? '✅ Found' : '❌ Missing');
        console.log('ADR class group visible:', adrClassGroup?.style.display !== 'none');
        console.log('ADR class select:', adrClassSelect ? '✅ Found' : '❌ Missing');
        console.log('ADR class value:', adrClassSelect?.value);
      }, 500);
    }
    
    function testFormElements() {
      if (!adminPanel) {
        console.error('Адміністративна панель не ініціалізована');
        return;
      }
      
      adminPanel.testFormElements();
    }
    
    function testAPI() {
      if (!adminPanel) {
        console.error('Адміністративна панель не ініціалізована');
        return;
      }
      
      adminPanel.testAPIConnection();
    }
    
    function testStatusUpdate() {
      if (!adminPanel) {
        console.error('Адміністративна панель не ініціалізована');
        return;
      }
      
      console.log('🧪 Запуск тесту оновлення статусу...');
      
      if (adminPanel.currentData.length === 0) {
        console.error('❌ Немає заявок для тестування');
        return;
      }
      
      const testId = adminPanel.currentData[0].id;
      console.log('Використовуємо ID:', testId);
      
      // Тест різних статусів
      const statuses = ['approved', 'in-progress', 'completed', 'rejected', 'pending'];
      let currentStatusIndex = 0;
      
      const testNextStatus = async () => {
        if (currentStatusIndex < statuses.length) {
          const status = statuses[currentStatusIndex];
          console.log(`Тестуємо статус: ${status}`);
          
          try {
            await adminPanel.testUpdateStatus(testId, status);
            currentStatusIndex++;
            
            // Невелика затримка між тестами
            setTimeout(testNextStatus, 2000);
          } catch (error) {
            console.error('❌ Помилка тесту:', error);
          }
        } else {
          console.log('✅ Всі тести статусів завершені');
        }
      };
      
      testNextStatus();
    }
  </script>
</body>
</html>
